; PlatformIO project file for the Rockbase NM-CYD-C5 (ESP32-C5) wardriving firmware
; Board pinout source: Bruce firmware's nm-cyd-c5 board definition

[env:nm-cyd-c5]
; Switched to match Bruce firmware's exact platform version + custom-compiled
; ESP-IDF libs package, rather than the standard pioarduino "stable" release.
; Bruce uses a custom build from their own contributor's lib-builder fork,
; which may include WiFi/BLE driver fixes for ESP32-C5 not yet in the
; standard release - this is the leading theory for why their wardriving
; mode is stable on this exact chip while ours has leaked despite matching
; application-level code/patterns.
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.36/platform-espressif32.zip
platform_packages =
    framework-arduinoespressif32-libs @ https://github.com/bmorcelli/esp32-arduino-lib-builder/releases/download/idf-release_v5.5/bruce_esp32-arduino-libs-20260123-153546.zip
board = esp32-c5-devkitc-1
framework = arduino

board_build.partitions = partitions_8mb.csv
board_build.f_cpu = 160000000L
board_build.variant = nm-cyd-c5
board_build.variants_dir = variants

build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
    -DUSER_SETUP_LOADED=1
    -DST7789_DRIVER=1
    -DTFT_WIDTH=240
    -DTFT_HEIGHT=320
    -DTFT_MISO=2
    -DTFT_MOSI=7
    -DTFT_SCLK=6
    -DTFT_CS=23
    -DTFT_DC=24
    -DTFT_RST=-1
    -DTFT_BL=25
    -DTOUCH_CS=1
    -DSPI_FREQUENCY=20000000
    -DSPI_READ_FREQUENCY=20000000
    -DSPI_TOUCH_FREQUENCY=2500000
    -DSMOOTH_FONT=1
    -DLOAD_GLCD=1
    -DLOAD_FONT2=1
    -DLOAD_FONT4=1
    -DLOAD_FONT6=1
    -DLOAD_FONT7=1
    -DLOAD_FONT8=1
    -DLOAD_GFXFF=1

lib_deps =
    mikalhart/TinyGPSPlus@^1.0.3
    PaulStoffregen/XPT2046_Touchscreen
    h2zero/NimBLE-Arduino@2.5

monitor_speed = 115200
upload_speed = 921600
